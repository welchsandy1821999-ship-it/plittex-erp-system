version: '3.8'
services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      - db
    
    # ⚡ МАГИЯ HOT RELOAD: Запускаем через nodemon
    command: npx nodemon web.js
    
    volumes:
      # ⚡ МАГИЯ HOT RELOAD: Пробрасываем твою папку с кодом внутрь контейнера
      - .:/app
      # Защищаем системные модули Linux от перезаписи файлами из Windows
      - /app/node_modules
      - ./public/uploads:/app/public/uploads
      - ./logs:/app/logs

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER} 
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: