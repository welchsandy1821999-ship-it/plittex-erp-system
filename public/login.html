<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Вход - Плиттекс ERP</title>
    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 350px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        #error-msg {
            color: #ef4444;
            margin-top: 15px;
            min-height: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>ПЛИТТЕКС ERP</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль" onkeypress="if(event.key === 'Enter') doLogin()">
        <button onclick="doLogin()">Войти</button>
        <div id="error-msg"></div>
    </div>

    <script>
        async function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const err = document.getElementById('error-msg');

            if (!u || !p) {
                err.innerText = 'Введите логин и пароль';
                return;
            }

            err.innerText = 'Авторизация...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('jwtToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/'; // Успешный вход -> идем в корень
                } else {
                    err.innerText = data.error || 'Ошибка входа';
                }
            } catch (e) {
                err.innerText = 'Ошибка соединения с сервером';
            }
        }
    </script>
</body>

</html>
