<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Плиттекс ERP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        
        /* Стили окна входа */
        #login-screen { text-align: center; margin-top: 10vh; }
        .login-box { display: inline-block; padding: 40px; background: #ecf0f1; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .login-box input { display: block; margin: 15px auto; padding: 12px; width: 220px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 16px; }
        
        /* Стили рабочей панели */
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; padding-bottom: 15px; margin-bottom: 25px; }
        .header-panel h1 { margin: 0; font-size: 24px; border: none; }
        
        .control-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e9ecef; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .control-panel label { font-weight: 500; color: #34495e; }
        select, input { padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 15px; }
        select { flex-grow: 1; min-width: 250px; }
        input[type="number"] { width: 90px; }
        
        /* Кнопки */
        .btn { border: none; padding: 10px 18px; font-size: 15px; border-radius: 5px; cursor: pointer; color: white; font-weight: 500; transition: 0.2s; }
        .btn-green { background-color: #27ae60; }
        .btn-green:hover { background-color: #219653; }
        .btn-blue { background-color: #3498db; }
        .btn-blue:hover { background-color: #2980b9; }
        .btn-red { background-color: #e74c3c; }
        .btn-red:hover { background-color: #c0392b; }
        
        /* Таблица */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: left; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        #app-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-screen">
        <h1>🔐 Система "Плиттекс"</h1>
        <div class="login-box">
            <input type="text" id="login-user" placeholder="Логин (director или master)">
            <input type="password" id="login-pass" placeholder="Пароль">
            <button class="btn btn-blue" id="login-btn">Войти в систему</button>
        </div>
    </div>

    <div id="app-screen">
        
        <div class="header-panel">
            <h1 id="welcome-message">🏭 Производство</h1>
            <div>
                <button class="btn btn-blue" id="finance-btn" style="display: none; margin-right: 10px;">💰 Отчет (Директор)</button>
                <button class="btn btn-red" id="logout-btn">Выход</button>
            </div>
        </div>
        
        <div class="control-panel">
            <label>Продукция:</label>
            <select id="product-select"><option value="">Загрузка...</option></select>
            
            <label>Объем:</label>
            <input type="number" id="produce-qty" value="14.4" step="0.1">
            
            <button class="btn btn-green" id="produce-btn">🔨 Запустить</button>
        </div>

        <h2>📦 Остатки на складе</h2>
        <table>
            <thead><tr><th>Товар / Сырье</th><th>Кол-во</th><th>Ед. изм.</th></tr></thead>
            <tbody id="inventory-table"></tbody>
        </table>
    </div>

</div>

<script>
    // --- АВТОРИЗАЦИЯ И РОЛИ ---
    document.getElementById('login-btn').addEventListener('click', () => {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;

        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(async response => {
            if (response.ok) {
                const data = await response.json();
                
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('welcome-message').innerText = `🏭 Завод | ${data.user.full_name}`;
                
                // ПРОФЕССИОНАЛЬНЫЙ RBAC (Проверка ролей)
                // Если зашел Директор - показываем финансовую кнопку
                if (data.user.role === 'admin') {
                    document.getElementById('finance-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('finance-btn').style.display = 'none';
                }
                
                loadProducts();
                loadTable();
            } else {
                const errText = await response.text();
                alert('Ошибка входа: ' + errText); 
            }
        });
    });

    // --- ЛОГИКА ВЫХОДА ---
    document.getElementById('logout-btn').addEventListener('click', () => {
        document.getElementById('app-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('login-pass').value = ''; // Очищаем пароль
    });

    // --- ПРОИЗВОДСТВО И ОТЛОВ ОШИБОК ---
    document.getElementById('produce-btn').addEventListener('click', () => {
        const tileId = document.getElementById('product-select').value;
        const quantity = parseFloat(document.getElementById('produce-qty').value);
        if (!tileId || quantity <= 0) return alert('Выберите товар и количество!');

        fetch('/api/produce', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tileId: tileId, quantity: quantity })
        }).then(async response => {
            if(response.ok) {
                alert('✅ Партия успешно произведена!');
                loadTable();
            } else {
                // ТЕПЕРЬ МЫ ПОКАЖЕМ ТОЧНУЮ ПРИЧИНУ ИЗ БАЗЫ ДАННЫХ
                const errText = await response.text();
                alert('❌ Ошибка производства: \n' + errText);
            }
        });
    });

    // (Функции загрузки таблиц)
    function loadTable() {
        fetch('/api/inventory').then(res => res.json()).then(data => {
            const tbody = document.getElementById('inventory-table');
            tbody.innerHTML = ''; 
            data.forEach(item => tbody.innerHTML += `<tr><td><strong>${item.name}</strong></td><td>${item.total}</td><td>${item.unit}</td></tr>`);
        });
    }

    function loadProducts() {
        fetch('/api/products').then(res => res.json()).then(products => {
            const select = document.getElementById('product-select');
            select.innerHTML = ''; 
            products.forEach(p => select.innerHTML += `<option value="${p.id}">${p.name}</option>`);
        });
    }
</script>

</body>
</html>
